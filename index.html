<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用车代金券赔付后台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="sidebar" aria-label="后台导航">
      <div class="brand">
        <strong>用车代金券赔付后台</strong>
        <span>定制活动</span>
      </div>
      <nav>
        <button class="nav-item active" data-page="configPage">配置管理页</button>
        <button class="nav-item" data-page="dataPage">数据页</button>
      </nav>
    </aside>

    <main class="app">
      <section class="page active" id="configPage">
        <header class="topbar">
          <div>
            <h1>配置管理页</h1>
            <p>配置活动有效状态、子业务类型和各用车券类型对应的赔付 code</p>
          </div>
          <button class="primary" id="createActivityBtn">新增活动</button>
        </header>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>活动管理</h2>
              <p>同一业务类型 + 子业务类型仅允许一条有效配置</p>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>活动编号</th>
                  <th>活动名称</th>
                  <th>业务类型</th>
                  <th>子业务类型</th>
                  <th>状态</th>
                  <th>券类型赔付配置</th>
                  <th>更新时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="activityTable"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="page" id="dataPage">
        <header class="topbar">
          <div>
            <h1>数据页</h1>
            <p>查看赔付数据，发放失败的代金券可在明细中重新赔付</p>
          </div>
        </header>

        <section class="panel">
          <div class="panel-head compact">
            <div>
              <h2>赔付数据</h2>
              <p>按赔付状态筛选记录，点击查看处理单张券补发</p>
            </div>
            <div class="filters">
              <select id="statusFilter" aria-label="赔付状态筛选">
                <option value="all">全部状态</option>
                <option value="success">赔付成功</option>
                <option value="partial_failed">部分失败</option>
                <option value="failed">赔付失败</option>
              </select>
              <input id="orderFilter" type="search" placeholder="搜索订单" />
              <input id="userFilter" type="search" placeholder="搜索用户" />
              <input id="voucherFilter" type="search" placeholder="搜索原券" />
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>赔付记录</th>
                  <th>用户</th>
                  <th>订单号</th>
                  <th>原券数量</th>
                  <th>状态</th>
                  <th>失败原因</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="recordTable"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <dialog id="activityDialog">
      <form method="dialog" class="dialog-form" id="activityForm">
        <header>
          <h2>活动配置</h2>
        </header>
        <label>
          活动名称
          <input name="name" required maxlength="30" />
        </label>
        <label>
          业务类型
          <select name="bizType" required>
            <option value="用车">用车</option>
          </select>
        </label>
        <fieldset class="radio-fieldset">
          <legend>子业务类型</legend>
          <label>
            <input type="radio" name="subBizType" value="顺风车" required />
            顺风车
          </label>
          <label>
            <input type="radio" name="subBizType" value="接送机" required />
            接送机
          </label>
          <label>
            <input type="radio" name="subBizType" value="网约车" required />
            网约车
          </label>
        </fieldset>
        <label>
          活动状态
          <select name="status" required>
            <option value="active">有效</option>
            <option value="inactive">无效</option>
          </select>
        </label>
        <label>
          普通券发券活动编号
          <input name="normalIssueActivityId" required maxlength="24" />
        </label>
        <fieldset class="mapping-fieldset">
          <legend>叠加券赔付 code 配置（可选）</legend>
          <label>
            辅营售卖预发券
            <input name="auxiliaryPresaleActivityId" maxlength="24" />
          </label>
          <label>
            免费发放预发券
            <input name="freeIssuePresaleActivityId" maxlength="24" />
          </label>
          <label>
            限时专享券
            <input name="limitedExclusiveActivityId" maxlength="24" />
          </label>
          <label>
            智能补贴预发券
            <input name="smartSubsidyPresaleActivityId" maxlength="24" />
          </label>
        </fieldset>
        <p class="form-error" id="activityFormError" aria-live="polite"></p>
        <footer>
          <button type="button" class="ghost" id="cancelActivityBtn">取消</button>
          <button type="submit" class="primary">保存</button>
        </footer>
      </form>
    </dialog>

    <dialog id="infoDialog">
      <div class="dialog-form">
        <header>
          <h2 id="infoTitle">详情</h2>
        </header>
        <div class="info-content" id="infoContent"></div>
        <footer>
          <button type="button" class="primary" id="closeInfoBtn">关闭</button>
        </footer>
      </div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
